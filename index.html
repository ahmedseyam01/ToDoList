<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗓️</text></svg>" />
  
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/style.css" />
  <title>To-Do List | Premium</title>
</head>

<body>
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
  </div>

  <div id="celebration-container"></div>

  <div class="app-wrapper">
    <!-- Sidebar / Navigation -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">✨</span>
        <span class="logo-text">FlowList</span>
      </div>
      
      <nav class="nav-menu">
        <button class="nav-item active" data-filter="all">
          <span class="icon">🏠</span> All Tasks
        </button>
        <button class="nav-item" data-filter="active">
          <span class="icon">⚡</span> Active
        </button>
        <button class="nav-item" data-filter="completed">
          <span class="icon">✅</span> Completed
        </button>
      </nav>

      <div class="categories-section">
        <h3>Categories</h3>
        <div class="category-list" id="categoryList">
          <button class="cat-item active" data-category="all">📁 General</button>
          <button class="cat-item" data-category="work">💼 Work</button>
          <button class="cat-item" data-category="personal">👤 Personal</button>
          <button class="cat-item" data-category="shopping">🛒 Shopping</button>
        </div>
      </div>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle">
          <span id="themeIcon">🌑</span> Dark Mode
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="dashboard-header">
        <div class="welcome-section">
          <h1 id="greeting">Hello, User!</h1>
          <p class="current-date" id="currentDate">Wednesday, April 22</p>
        </div>
        
        <div class="header-stats">
          <div class="stat-card">
            <span class="stat-value" id="remainingCount">0</span>
            <span class="stat-label">Tasks Left</span>
          </div>
          <div class="progress-box">
            <div class="progress-ring-mini">
              <svg width="40" height="40">
                <circle class="ring-bg" r="16" cx="20" cy="20" />
                <circle class="ring-fill" id="miniProgressRing" r="16" cx="20" cy="20" />
              </svg>
              <span id="miniProgressPercent">0%</span>
            </div>
          </div>
        </div>
      </header>

      <div class="search-bar-modern">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Find anything..." />
        <kbd class="search-shortcut">⌘K</kbd>
      </div>

      <section class="task-creation-card">
        <div class="input-container-modern">
          <input type="text" id="todoInput" placeholder="Add a new task..." autocomplete="off" />
          <div class="input-actions-modern">
            <select id="categorySelector" class="category-select">
              <option value="general">📁 General</option>
              <option value="work">💼 Work</option>
              <option value="personal">👤 Personal</option>
              <option value="shopping">🛒 Shopping</option>
            </select>
            <div class="priority-pills" id="prioritySelector">
              <button class="p-pill high" data-priority="high" title="High"></button>
              <button class="p-pill medium active" data-priority="medium" title="Medium"></button>
              <button class="p-pill low" data-priority="low" title="Low"></button>
            </div>
          </div>
        </div>
        <button onclick="addTask()" class="btn-primary-modern" id="addBtn">Add Task</button>
        <button class="btn-secondary-modern d-none" onclick="updateElement()" id="updateBtn">Update</button>
      </section>

      <div class="list-controls">
        <h2 id="listTitle">All Tasks</h2>
        <button class="btn-clear" onclick="clearAllTasks()">Clear Completed</button>
      </div>

      <ul class="task-grid" id="todoList">
        <!-- Tasks will be injected here -->
      </ul>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./js/main.js"></script>
</body>

</html>
